PackageUrl: https://code.claude.com
License: Proprietary
LicenseUrl: https://www.anthropic.com/legal/commercial-terms
Copyright: Copyright (c) 2024-2026 Anthropic
ShortDescription: Agentic coding tool that lives in your terminal
Description: |
  Claude Code is an agentic coding tool that lives in your terminal, understands your codebase,
  and helps you code faster by executing routine tasks, explaining complex code, and handling
  git workflows -- all through natural language commands.

  Use it in your terminal, IDE, or tag @claude on GitHub.

  NOTE: This package (Claude Code) is the CLI tool and can be installed alongside Claude Desktop.
  Both packages can coexist on the same system. If you have both installed, use the full path
  or ensure your PATH is configured to access the desired "claude" command.
Moniker: claude-code
