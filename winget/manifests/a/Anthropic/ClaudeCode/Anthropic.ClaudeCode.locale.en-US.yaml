Documentations:
  - DocumentLabel: Documentation
    DocumentUrl: https://code.claude.com/docs/en/overview
  - DocumentLabel: Setup Guide
    DocumentUrl: https://code.claude.com/docs/en/setup
InstallationNotes: |
  After installation, open a new terminal and run 'claude' to start using Claude Code.

  If you also have Claude Desktop installed, both applications can coexist. The 'claude'
  command will invoke whichever application appears first in your PATH. To explicitly
  use Claude Code, you can:
  1. Use the full path to the Claude Code executable
  2. Adjust your PATH environment variable to prioritize Claude Code
  3. Create an alias (e.g., 'claude-code') in your shell profile
